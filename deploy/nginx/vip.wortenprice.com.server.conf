# This server block replaces the existing vip.wortenprice.com block in nginx.conf.
server {
    listen 443 ssl http2;
    server_name vip.wortenprice.com;

    root /home/homepage/wortener/dist;

    ssl_certificate     /etc/nginx/cert/vip.wortenprice.com.pem;
    ssl_certificate_key /etc/nginx/cert/vip.wortenprice.com.key;

    access_log /var/log/nginx/vip.wortenprice.com.migration.access.log;
    error_log  /var/log/nginx/vip.wortenprice.com.migration.error.log;

    proxy_buffer_size 128k;
    proxy_buffers 32 32k;
    proxy_busy_buffers_size 128k;
    client_max_body_size 50m;
    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;
    proxy_read_timeout 3600;
    send_timeout 3600;
    keepalive_timeout 600;
    real_ip_header X-Forwarded-For;

    location = / { return 301 https://app.autopricy.com/; }
    location = /help.html { return 301 https://app.autopricy.com/help.html; }
    location = /privacy.html { return 301 https://app.autopricy.com/privacy.html; }
    location = /terms.html { return 301 https://app.autopricy.com/terms.html; }
    location = /login { return 301 "https://app.autopricy.com/#/login"; }
    location = /register { return 301 "https://app.autopricy.com/#/register"; }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\n";
    }

    # Compatibility paths retained during the first migration phase.
    location = /umami.js {
        rewrite ^/umami\.js$ /script.js break;
        proxy_pass http://127.0.0.1:3000/script.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /socket.io/ {
        proxy_pass http://localhost:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/send {
        proxy_pass http://127.0.0.1:3000/api/send;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://localhost:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location ~* ^/(assets|css|js|img|fonts|doc-images)/ {
        add_header X-Robots-Tag "noindex, follow" always;
        try_files $uri =404;
    }

    location ~* ^.+\.(jpg|jpeg|gif|png|webp|svg|ico|css|js|map|woff|woff2|ttf|pdf|txt)$ {
        add_header X-Robots-Tag "noindex, follow" always;
        try_files $uri =404;
    }

    location / { return 410; }
}
