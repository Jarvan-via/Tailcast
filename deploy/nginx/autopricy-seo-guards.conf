# Apply these directives inside the existing autopricy.com and
# app.autopricy.com server blocks. This file documents the production guards
# and is not intended to be included as a standalone conf.d file.

# autopricy.com: the public website is static, so unknown paths must not fall
# back to the homepage as soft 404s.
location / {
    try_files $uri $uri/ =404;
}

# app.autopricy.com: the private SPA and static documents are intentionally
# excluded from indexing. Repeat X-Robots-Tag in this location because an
# add_header at location scope disables inheritance from the server scope.
location / {
    add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    add_header X-Robots-Tag "noindex, follow" always;
    try_files $uri /index.html;
}

# There is no app sitemap because every app page is noindex.
location = /sitemap.xml {
    return 410;
}
