# Safe to enable before DNS cutover. It provides the ACME HTTP-01 webroot and
# exact HTTP migration behavior once wortenprice.com points to ali.
server {
    listen 80;
    listen [::]:80;
    server_name wortenprice.com;

    root /home/homepage/autopricy/dist;

    access_log /var/log/nginx/wortenprice.com.redirect.access.log;
    error_log  /var/log/nginx/wortenprice.com.redirect.error.log;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location = / { return 301 https://autopricy.com/; }
    location = /tiaojia.html { return 301 "https://autopricy.com/#features"; }
    location = /zidong-tiaojia.html { return 301 "https://autopricy.com/#workflow"; }
    location = /jingzheng-tiaojia.html { return 301 "https://autopricy.com/#features"; }
    location = /piliang-tiaojia.html { return 301 "https://autopricy.com/#features"; }
    location = /robots.txt { return 301 https://autopricy.com/robots.txt; }
    location = /sitemap.xml { return 301 https://autopricy.com/sitemap.xml; }
    location / { return 410; }
}
